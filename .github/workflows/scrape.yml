name: Bingo Auto Scraper

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝 Chrome 瀏覽器 # 新增這一步，確保環境有瀏覽器
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安裝必要套件
        run: pip install selenium webdriver-manager beautifulsoup4 firebase-admin

      - name: 執行爬蟲並同步雲端
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python bg.py
