name: Bingo Auto Scraper

on:
  schedule:
    - cron: '*/6 * * * *' # 每 6 分鐘執行一次
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        # 這裡新增了 firebase-admin
        run: pip install selenium webdriver-manager beautifulsoup4 firebase-admin

      - name: 執行爬蟲並推送到 Firebase
        env:
          # 這裡會讀取您在 GitHub 設定的 Secret
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python bg.py
