<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 數字機率</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { font-size: 16px; }
        .ball { width: 44px; height: 44px; font-size: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        sub { font-size: 0.7rem; position: absolute; bottom: 2px; right: 4px; font-weight: 900; }
        .limit-active { background-color: #4f46e5 !important; border-color: #818cf8 !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 p-4 leading-relaxed">
    <div class="max-w-3xl mx-auto space-y-8">
        <header class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h1 class="text-2xl font-bold text-yellow-500">AI 數字機率</h1>
            <p id="cur-period" class="text-indigo-400 font-mono text-lg mt-1 tracking-tight">正在載入雲端數據...</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-indigo-400">
            <h3 class="text-xl font-bold text-indigo-300 mb-4">分析範圍切換</h3>
            <div class="flex gap-4">
                <button onclick="changeLimit(5)" id="btn-5" class="px-6 py-2 rounded-lg bg-slate-700 font-bold">近 5 期</button>
                <button onclick="changeLimit(10)" id="btn-10" class="px-6 py-2 rounded-lg bg-indigo-600 font-bold limit-active">近 10 期</button>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-2xl border-t-8 border-yellow-500 shadow-2xl text-center">
            <h2 class="text-xl font-bold text-yellow-500 mb-6 tracking-widest text-center">🔮 AI 核心預測 (6球模式)</h2>
            <div id="pred-box" class="flex justify-around mb-8"></div>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="setStrat('hot')" class="bg-orange-600 p-4 rounded-xl font-bold">🔥 追熱門</button>
                <button onclick="setStrat('balanced')" class="bg-emerald-600 p-4 rounded-xl font-bold">⚖️ 均衡</button>
                <button onclick="setStrat('luck')" class="bg-purple-600 p-4 rounded-xl font-bold">🎲 拼運氣</button>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h3 class="text-xl font-bold text-emerald-400 mb-6">🔍 號碼屬性分析 (N1-N7)</h3>
            <div id="n-groups" class="space-y-6"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border-l-8 border-indigo-500">
            <h3 class="text-xl font-bold text-indigo-400 mb-4">⭐ 星級配號 (依最新公式)</h3>
            <div id="star-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        let fullHistory = [];
        let currentLimit = 10;
        let currentStrat = 'hot';

        const nDefs = {
            n1: "<b>N1 溫熱：</b>近 10 期高機率（出現 2~3 次）的號碼。",
            n2: "<b>N2 回歸：</b>近 10 期出現 2 次且近期未開，具備回歸潛力。",
            n3: "<b>N3 拖號：</b>根據上期鄰號邏輯推薦。",
            n4: "<b>N4 共伴：</b>具備高共伴率的組合。",
            n5: "<b>N5 破冰：</b>遺漏期數最長（最冷號）。",
            n6: "<b>N6 未開小號：</b>近 2 期皆未開出且在 1-10 之間。",
            n7: "<b>N7 5熱：</b>近 5 期內強勢號碼。"
        };

        // 從專案中的 history.json 讀取數據
        async function loadData() {
            try {
                // 讀取當前專案目錄下的檔案
                const res = await fetch('history.json?t=' + Date.now());
                fullHistory = await res.json();
                renderAll();
            } catch (e) {
                document.getElementById('cur-period').innerText = "數據尚未同步，請稍後...";
            }
        }

        function renderAll() {
            if (!fullHistory.length) return;
            const historyData = fullHistory.slice(0, currentLimit);
            const numsOnly = historyData.map(h => h.numbers);
            const counts = getCounts(numsOnly);
            
            // 計算 N1-N7
            const nGroups = calculateNGroups(historyData, counts);
            
            // 渲染期數
            document.getElementById('cur-period').innerText = `最新期數：${fullHistory[0].period} (分析範圍: ${historyData.length} 期)`;

            // 渲染預測
            renderPrediction(numsOnly, counts, nGroups);

            // 渲染 N1-N7
            renderNGroups(nGroups);

            // 渲染星級
            renderStars(nGroups);
        }

        function getCounts(nums) {
            let c = {};
            nums.flat().forEach(n => c[n] = (c[n] || 0) + 1);
            return c;
        }

        function calculateNGroups(history, counts) {
            const all = Array.from({length: 80}, (_, i) => (i+1).toString().padStart(2, '0'));
            const last = history[0].numbers;
            const last2 = history[0].numbers.concat(history[1] ? history[1].numbers : []);
            const counts5 = getCounts(history.slice(0, 5).map(h => h.numbers));

            const n1 = all.filter(n => counts[n] >= 2 && counts[n] <= 3);
            const n2 = all.filter(n => counts[n] === 2 && !last.includes(n));
            const n5 = all.sort((a, b) => {
                const idxA = history.findIndex(h => h.numbers.includes(a));
                const idxB = history.findIndex(h => h.numbers.includes(b));
                return (idxA === -1 ? 11 : idxA) - (idxB === -1 ? 11 : idxB);
            }).reverse().slice(0, 15);
            
            const n6 = all.filter(n => parseInt(n) <= 10 && !last2.includes(n));
            const n7 = all.filter(n => counts5[n] >= 2);

            const limit = (arr) => arr.sort(() => 0.5 - Math.random()).slice(0, 10);
            
            return {
                n1: limit(n1).map(n => ({num: n, count: counts[n] || 0})),
                n2: limit(n2).map(n => ({num: n, count: counts[n] || 0})),
                n3: last.slice(0, 5).map(n => ({num: ((parseInt(n)+1)%80 || 80).toString().padStart(2, '0'), count: counts[n] || 0})),
                n4: limit(all.filter(n => counts[n] >= 2)).map(n => ({num: n, count: counts[n] || 0})),
                n5: limit(n5).map(n => ({num: n, count: counts[n] || 0})),
                n6: limit(n6).map(n => ({num: n, count: counts[n] || 0})),
                n7: limit(n7).map(n => ({num: n, count: counts[n] || 0}))
            };
        }

        function renderPrediction(nums, counts, groups) {
            let used = [];
            const pick = (arr, count) => {
                const pool = arr.map(a => a.num || a).filter(n => !used.includes(n));
                const res = pool.sort(() => 0.5 - Math.random()).slice(0, count);
                used.push(...res);
                return res.map(n => ({num: n, count: counts[n] || 0}));
            };

            let res = [];
            const high = Object.keys(counts).filter(n => counts[n] >= 3);

            if (currentStrat === 'hot') {
                res = [...pick(high, 2), ...pick(groups.n3, 2), ...pick(groups.n4, 1), ...pick(groups.n7, 1)];
            } else if (currentStrat === 'balanced') {
                res = [...pick(high, 1), ...pick(groups.n3, 1), ...pick(groups.n4, 1), ...pick(groups.n2, 2), ...pick(groups.n6, 1)];
            } else {
                res = [...pick(high, 1), ...pick(groups.n6, 2), ...pick(groups.n4, 1), ...pick(groups.n5, 1), ...pick(groups.n7, 1)];
            }

            document.getElementById('pred-box').innerHTML = res.map(i => `
                <div class="ball bg-gradient-to-tr from-yellow-400 to-yellow-600 text-slate-900 shadow-xl">
                    ${i.num}<sub>.${i.count}</sub>
                </div>`).join('');
        }

        function renderNGroups(groups) {
            document.getElementById('n-groups').innerHTML = Object.entries(nDefs).map(([k, def]) => `
                <div class="border-b border-slate-700 pb-4">
                    <p class="text-emerald-300 mb-2">${def}</p>
                    <div class="flex flex-wrap gap-x-4">
                        ${groups[k].map(i => `<span class="text-slate-300 font-bold text-xl">${i.num}<sub>.${i.count}</sub></span>`).join('')}
                    </div>
                </div>`).join('');
        }

        function renderStars(groups) {
            const pick = (k, c) => groups[k].map(i => i.num).sort(() => 0.5 - Math.random()).slice(0, c);
            const stars = {
                "2星": pick('n1', 2),
                "3星": pick('n1', 2).concat(pick('n5', 1)),
                "4星": pick('n1', 2).concat(pick('n3', 1), pick('n5', 1)),
                "5星": pick('n1', 2).concat(pick('n3', 2), pick('n5', 1)),
                "6星": pick('n1', 3).concat(pick('n3', 2), pick('n5', 1))
            };
            document.getElementById('star-list').innerHTML = Object.entries(stars).map(([k, v]) => `
                <div class="bg-slate-900/50 p-3 rounded border border-slate-700">
                    <span class="text-indigo-300 font-bold">${k}:</span> ${v.join(', ')}
                </div>`).join('');
        }

        function changeLimit(l) { currentLimit = l; renderAll(); }
        function setStrat(s) { currentStrat = s; renderAll(); }
        window.onload = loadData;
    </script>
</body>
</html>
